spring.application.name=app

# Configurações JDBC: use variáveis de ambiente para credenciais
# Exemplo de variáveis: APP_JDBC_URL, APP_JDBC_USERNAME, APP_JDBC_PASSWORD, APP_JDBC_DRIVER
# Valores padrão opcionais são fornecidos apenas para desenvolvimento local.
app.jdbc.url=${APP_JDBC_URL:jdbc:postgresql://localhost:5432/vshopt}
app.jdbc.username=${APP_JDBC_USERNAME:vshopt_user}
app.jdbc.password=${APP_JDBC_PASSWORD:change_me}
app.jdbc.driver=${APP_JDBC_DRIVER:org.postgresql.Driver}

# Inicialização automática de schema/data (ajuste conforme necessário)
spring.sql.init.mode=always
